name: CI Umbrella

# Single orchestration workflow for SPEX CI gates.
# This workflow centralizes execution and calls reusable workflows.
# All CI checks (build, lint, release-readiness, CodeQL, version-guard)
# are orchestrated from here as a single status entry.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_extended_checks:
        description: Run robustness and supply-chain release checks.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 3 * * 1'

concurrency:
  group: ci-umbrella-${{ github.ref }}
  cancel-in-progress: true

# Permissions granted to all called workflows.
# CodeQL requires security-events:write and actions:read.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  rust:
    name: Rust CI
    uses: ./.github/workflows/rust.yml

  release-readiness:
    name: Release Readiness
    uses: ./.github/workflows/release-readiness.yml
    with:
      run_extended: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_extended_checks == true) }}

  codeql:
    name: CodeQL
    uses: ./.github/workflows/codeql.yml
    permissions:
      contents: read
      security-events: write
      actions: read

  version-guard:
    name: Version Guard
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/version-guard.yml

name: CodeQL

# Static security analysis via GitHub CodeQL.
# Uses build-mode: none — the Rust extractor performs source-level analysis
# without compiling the project, saving significant CI time.

on:
  workflow_call:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: CodeQL requires security-events write; everything else is read.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    # Rust is the only language in this repository; no matrix needed.
    name: Analyze (rust)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:rust

name: CodeQL

# Static security analysis via GitHub CodeQL.
# Recommended for open source security-sensitive projects.
# Runs on push/PR to main and on weekly schedule.
#
# The `rust` language support uses `build-mode: autobuild`; CodeQL will
# invoke `cargo build` internally and extract the compilation database.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - 'docs/**'
      - 'LICENSE.MD'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - 'docs/**'
      - 'LICENSE.MD'
  schedule:
    # Run every Monday at 04:00 UTC independent of push activity.
    - cron: '0 4 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # CodeQL supports Rust natively as of the Rust extractor GA.
        # Add 'actions' if you use composite or reusable actions worth scanning.
        language: [rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: codeql-${{ runner.os }}
          cache-on-failure: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the security-extended query suite for a security-critical project.
          queries: security-extended

      - name: Build for CodeQL (autobuild)
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

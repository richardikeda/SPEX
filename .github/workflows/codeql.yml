name: CodeQL

# Static security analysis via GitHub CodeQL.
# Uses build-mode: none — the Rust extractor performs source-level analysis
# without compiling the project, saving significant CI time.

on:
  workflow_call:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: CodeQL requires security-events write; everything else is read.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [rust]
        build-mode: [none]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

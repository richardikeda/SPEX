name: Release Readiness

on:
  workflow_call:
    inputs:
      run_extended:
        description: Run robustness and supply-chain jobs.
        required: false
        default: false
        type: boolean

# Cancel in-progress runs on PRs and pushes, but let manual/scheduled runs
# complete fully — those trigger the expensive robustness and supply-chain gates.
concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Gate 1: critical security-sensitive crates ──────────────────────────────
  release-critical-tests:
    name: Critical release tests (core, mls, transport)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-critical-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        run: |
          for i in 1 2 3; do
            cargo fetch --locked && exit 0
            echo "cargo fetch failed (attempt $i), retrying..."
            sleep 5
          done
          echo "cargo fetch failed after retries"
          exit 1

      # Run each critical crate individually for clear failure attribution.
      - name: Test spex-core (all features)
        run: cargo test -p spex-core --locked --all-features

      - name: Test spex-mls (all features)
        run: cargo test -p spex-mls --locked --all-features

      - name: Test spex-transport (all features)
        run: cargo test -p spex-transport --locked --all-features

  # ── Gate 2: documentation quality and static analysis ───────────────────────
  release-docs-and-quality:
    name: Docs and quality gates (fmt, clippy, doc, release script)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-docs-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        run: |
          for i in 1 2 3; do
            cargo fetch --locked && exit 0
            echo "cargo fetch failed (attempt $i), retrying..."
            sleep 5
          done
          echo "cargo fetch failed after retries"
          exit 1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --locked --all-features -- -D warnings

      - name: Check docs compile
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Release gate docs
        run: ./scripts/release_gate_docs.sh

  # ── Gate 3: failure-path / negative behavior validation ─────────────────────
  release-negative-gate:
    name: Negative gate (failure-path validation)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate block-on-failure behavior
        run: ./scripts/release_gate_negative_test.sh

  # ── Gate 4: full robustness suite + fuzz smoke (manual / weekly only) ────────
  release-robustness:
    if: inputs.run_extended
    name: Robustness and fuzz smoke tests
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Rust (nightly — required for cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Separate key: nightly toolchain produces a different artifact tree.
          shared-key: release-robustness-${{ runner.os }}-nightly
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        run: |
          for i in 1 2 3; do
            cargo fetch --locked && exit 0
            echo "cargo fetch failed (attempt $i), retrying..."
            sleep 5
          done
          echo "cargo fetch failed after retries"
          exit 1

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Crate-level robustness suites
        run: |
          cargo test -p spex-core --locked
          cargo test -p spex-mls --locked
          cargo test -p spex-transport --locked
          cargo test -p spex-bridge --locked
          cargo test -p spex-client --locked
          cargo test -p spex-cli --locked

      - name: Fuzz smoke (deterministic 30 s per target, seed=1)
        run: |
          set -euo pipefail
          for target_file in fuzz/fuzz_targets/*.rs; do
            target_name="$(basename "${target_file}" .rs)"
            echo "==> Fuzz smoke: ${target_name}"
            cargo +nightly fuzz run "${target_name}" --fuzz-dir fuzz -- -max_total_time=30 -seed=1
          done

  # ── Gate 5: supply-chain audit (manual / weekly only) ────────────────────────
  release-supply-chain:
    if: inputs.run_extended
    name: Supply chain security (audit + deny)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # rust-cache also caches ~/.cargo/bin, so cargo-audit and cargo-deny are
      # restored on subsequent runs without recompilation.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-supply-chain-${{ runner.os }}
          cache-on-failure: true

      # taiki-e/install-action downloads pre-built binaries — much faster than
      # compiling cargo-audit and cargo-deny from source.
      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: cargo audit (CVE / RUSTSEC advisory check)
        run: cargo audit

      - name: cargo deny check (licenses + bans + advisories + sources)
        run: cargo deny check

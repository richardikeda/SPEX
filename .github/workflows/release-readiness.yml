name: Release Readiness

on:
  workflow_call:
    inputs:
      run_extended:
        description: Run robustness and supply-chain jobs.
        required: false
        default: false
        type: boolean

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-critical-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-critical-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        run: |
          for i in 1 2 3; do
            cargo fetch --locked && exit 0
            echo "cargo fetch failed (attempt $i), retrying..."
            sleep 5
          done
          echo "cargo fetch failed after retries"
          exit 1

      - name: Critical release scope tests
        run: |
          cargo test -p spex-core -p spex-mls -p spex-transport --locked --all-features --verbose

  release-docs-and-quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-docs-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        run: |
          for i in 1 2 3; do
            cargo fetch --locked && exit 0
            echo "cargo fetch failed (attempt $i), retrying..."
            sleep 5
          done
          echo "cargo fetch failed after retries"
          exit 1

      - name: Docs and quality gates
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --locked -- -D warnings
          ./scripts/release_gate_docs.sh

  release-negative-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate block-on-failure behavior
        run: ./scripts/release_gate_negative_test.sh

  release-robustness:
    if: inputs.run_extended
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-robustness-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        run: |
          for i in 1 2 3; do
            cargo fetch --locked && exit 0
            echo "cargo fetch failed (attempt $i), retrying..."
            sleep 5
          done
          echo "cargo fetch failed after retries"
          exit 1

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Crate-level robustness suites
        run: |
          cargo test -p spex-core --locked --verbose
          cargo test -p spex-mls --locked --verbose
          cargo test -p spex-transport --locked --verbose
          cargo test -p spex-bridge --locked --verbose
          cargo test -p spex-client --locked --verbose
          cargo test -p spex-cli --locked --verbose

      - name: Fuzz smoke (deterministic short run)
        run: |
          set -euo pipefail
          for target_file in fuzz/fuzz_targets/*.rs; do
            target_name="$(basename "${target_file}" .rs)"
            echo "Running fuzz smoke for ${target_name}"
            cargo +nightly fuzz run "${target_name}" --fuzz-dir fuzz -- -max_total_time=30 -seed=1
          done

  release-supply-chain:
    if: inputs.run_extended
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: cargo audit
        run: cargo audit

      - name: cargo deny check
        run: cargo deny check

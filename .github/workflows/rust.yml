name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, beta]
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "false"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@8417cffc2ec64127ad83077aceaa8631f7cdc83e

      - name: Validate native dependencies (pkg-config)
        if: runner.os == 'Linux'
        run: pkg-config --version

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-ci-${{ github.job }}-${{ runner.os }}-${{ matrix.toolchain }}"
          cache-on-failure: true
          add-job-id-key: false
          cache-directories: |
            ${{ env.SCCACHE_DIR }}

      - name: Fetch deps (warm cache)
        run: cargo fetch --locked

      - name: Build (workspace)
        run: cargo build --workspace --locked --verbose

      - name: Test (default features)
        if: matrix.toolchain == 'stable' && runner.os == 'Linux'
        run: cargo test --workspace --locked --verbose

      - name: Test (all features)
        if: matrix.toolchain == 'stable' && runner.os == 'Linux'
        run: cargo test --workspace --locked --all-features --verbose

      - name: Test (release profile)
        if: matrix.toolchain == 'stable' && runner.os == 'Linux'
        run: cargo test --workspace --locked --release --verbose

      - name: sccache stats
        run: sccache --show-stats || true

  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, beta]
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "false"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (fmt, clippy)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Install sccache
        uses: mozilla-actions/sccache-action@8417cffc2ec64127ad83077aceaa8631f7cdc83e

      - name: Validate native dependencies (pkg-config)
        if: runner.os == 'Linux'
        run: pkg-config --version

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-ci-${{ github.job }}-${{ runner.os }}-${{ matrix.toolchain }}"
          cache-on-failure: true
          add-job-id-key: false
          cache-directories: |
            ${{ env.SCCACHE_DIR }}

      - name: Fetch deps (warm cache)
        run: cargo fetch --locked

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

      - name: sccache stats
        run: sccache --show-stats || true

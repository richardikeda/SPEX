name: Rust CI

on:
  workflow_call:

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }}, ${{ matrix.toolchain }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary: Ubuntu stable — runs the full test suite.
          - os: ubuntu-24.04
            toolchain: stable
            run_tests: true
          # Beta: catches regressions before they land in stable.
          - os: ubuntu-24.04
            toolchain: beta
            run_tests: false
          # macOS: cross-platform build smoke test.
          - os: macos-latest
            toolchain: stable
            run_tests: false
          # Windows: cross-platform build smoke test (important for open-source CLI).
          - os: windows-latest
            toolchain: stable
            run_tests: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci-${{ runner.os }}-${{ matrix.toolchain }}
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        shell: bash
        run: |
          for i in 1 2 3; do
            cargo fetch --locked && exit 0
            echo "cargo fetch failed (attempt $i), retrying..."
            sleep 5
          done
          echo "cargo fetch failed after retries"
          exit 1

      - name: Build (workspace)
        run: cargo build --workspace --locked

      - name: Test (default features)
        if: matrix.run_tests
        run: cargo test --workspace --locked

      - name: Test (all features)
        if: matrix.run_tests
        run: cargo test --workspace --locked --all-features

  lint:
    name: lint (ubuntu-24.04, stable)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci-lint-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        shell: bash
        run: |
          for i in 1 2 3; do
            cargo fetch --locked && exit 0
            echo "cargo fetch failed (attempt $i), retrying..."
            sleep 5
          done
          echo "cargo fetch failed after retries"
          exit 1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --locked --all-features -- -D warnings

      - name: Check docs compile
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

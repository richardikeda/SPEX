name: Rust CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - 'docs/**'
      - 'LICENSE.MD'
      - '.github/branch-protection/**'
      - 'scripts/release_gate_docs.sh'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
      - 'docs/**'
      - 'LICENSE.MD'
      - '.github/branch-protection/**'
      - 'scripts/release_gate_docs.sh'

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }}, ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
            run_tests: true
          - os: ubuntu-latest
            toolchain: beta
            run_tests: false
          - os: macos-latest
            toolchain: stable
            run_tests: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci-${{ runner.os }}-${{ matrix.toolchain }}
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        run: cargo fetch --locked

      - name: Build (workspace)
        run: cargo build --workspace --locked --verbose

      - name: Test (default features)
        if: matrix.run_tests
        run: cargo test --workspace --locked --verbose

      - name: Test (all features)
        if: matrix.run_tests
        run: cargo test --workspace --locked --all-features --verbose

  lint:
    name: lint (ubuntu, stable)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (fmt, clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci-lint-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch deps (warm cache)
        run: cargo fetch --locked

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

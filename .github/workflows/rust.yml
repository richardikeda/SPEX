name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-24.04
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install sccache
        uses: mozilla-actions/sccache-action@8417cffc2ec64127ad83077aceaa8631f7cdc83e
      - name: Validate native dependencies (pkg-config)
        run: pkg-config --version
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-ci"
          cache-on-failure: true
      - name: Fetch deps (warm cache)
        run: cargo fetch --locked
      - name: Build
        run: cargo build --workspace --locked --verbose
      - name: Test
        run: cargo test --workspace --locked --verbose

  lint:
    runs-on: ubuntu-24.04
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain (fmt, clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install sccache
        uses: mozilla-actions/sccache-action@8417cffc2ec64127ad83077aceaa8631f7cdc83e
      - name: Validate native dependencies (pkg-config)
        run: pkg-config --version
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-ci"
          cache-on-failure: true
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Fetch deps (warm cache)
        run: cargo fetch --locked
      - name: Clippy
        run: cargo clippy --workspace --locked --all-targets -- -D warnings

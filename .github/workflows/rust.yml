name: Rust CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }}, ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
            run_tests: true
          - os: ubuntu-latest
            toolchain: beta
            run_tests: false
          - os: macos-latest
            toolchain: stable
            run_tests: false
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "false"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci-${{ runner.os }}-${{ matrix.toolchain }}
          cache-on-failure: true
          add-job-id-key: false
          cache-directories: |
            ${{ env.SCCACHE_DIR }}

      - name: Fetch deps (warm cache)
        run: cargo fetch --locked

      - name: Build (workspace)
        run: cargo build --workspace --locked --verbose

      - name: Test (default features)
        if: matrix.run_tests
        run: cargo test --workspace --locked --verbose

      - name: Test (all features)
        if: matrix.run_tests
        run: cargo test --workspace --locked --all-features --verbose

      - name: sccache stats
        run: sccache --show-stats || true

  lint:
    name: lint (ubuntu, stable)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "false"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (fmt, clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci-lint-${{ runner.os }}
          cache-on-failure: true
          add-job-id-key: false
          cache-directories: |
            ${{ env.SCCACHE_DIR }}

      - name: Fetch deps (warm cache)
        run: cargo fetch --locked

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

      - name: sccache stats
        run: sccache --show-stats || true

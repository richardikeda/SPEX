[package]
name = "spex-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "spex"
path = "main.rs"

[dependencies]
base64 = "0.21"
chacha20poly1305 = "0.10"
clap = { version = "4.5", features = ["derive"] }
dirs = "5.0"
ed25519-dalek = "2.1"
hex = "0.4"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_cbor = "0.11"
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.37", features = ["rt-multi-thread", "macros"] }

spex-core = { path = "../../spex-core" }
spex-mls = { path = "../spex-mls" }
spex-transport = { path = "../spex-transport" }
spex-bridge = { path = "../spex-bridge" }

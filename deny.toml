# cargo-deny v2 configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny check

[advisories]
version = 2
# Deny packages with active security advisories.
yanked = "deny"
# RUSTSEC-2021-0127 (serde_cbor unmaintained) resolved by migrating to ciborium in v1.0.4.
# No advisory exceptions are required.

[bans]
multiple-versions = "warn"
# Deny wildcard dependency specs (e.g. `foo = "*"`).
wildcards = "deny"
highlight = "all"

[licenses]
version = 2
confidence-threshold = 0.8
# Allowed SPDX identifiers for all transitive dependencies.
# MPL-2.0 is the project's own license; the rest are permissive licenses
# commonly used in the Rust ecosystem.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

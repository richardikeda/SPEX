# cargo-deny v2 configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny check

[advisories]
version = 2
# Deny packages with active security advisories.
# NOTE: yanked = "warn" instead of "deny" because core2 v0.4.0 is yanked but
# unavoidable: multihash v0.19.3 requires core2 ^0.4.0 and there is no
# non-yanked release in that range. This constraint is inherited via libp2p.
# Tracked: upgrade libp2p when a compatible version drops core2.
yanked = "warn"
# RUSTSEC-2021-0127 (serde_cbor unmaintained) resolved by migrating to ciborium in v1.0.4.
# RUSTSEC-2024-0436 (paste unmaintained): indirect dep via libp2p-tcp → if-watch
# → netlink-packet-core. Already at latest (1.0.15); no upstream fix available
# without upgrading libp2p. Tracked for the next libp2p bump.
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "Indirect dependency via libp2p; paste is not used in SPEX core code. Tracked for libp2p upgrade." },
]

[bans]
multiple-versions = "warn"
# Deny wildcard dependency specs (e.g. `foo = "*"`).
wildcards = "deny"
highlight = "all"

[licenses]
version = 2
confidence-threshold = 0.8
# Allowed SPDX identifiers for all transitive dependencies.
# MPL-2.0 is the project's own license; the rest are permissive licenses
# commonly used in the Rust ecosystem.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
